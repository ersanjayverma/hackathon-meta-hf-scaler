benchmark_name: email_triage_benchmark
name: email_triage_benchmark
version: 1.0.0

description: >
  Enterprise email triage system for classification, prioritization, and escalation.

action_space:
  type: discrete
  actions:
    - classify(email_id, category)
    - ignore(email_id)
    - respond(email_id, template, priority)
    - escalate(email_id, priority)
    - wait

observation_space:
  type: structured
  fields:
    - inbox
    - processed_email_ids
    - metadata

tasks:
  - task_easy_classification
  - task_medium_prioritization
  - task_hard_thread_reasoning

metadata:
  author: blackhatbadshah
  license: mit

service:
  sdk: docker
  app_file: server/app.py
  port: 7860
  healthcheck:
    path: /
    method: GET

entry_point: environments.email_triage_env:EmailTriageEnv

observation_schema:
  title: Observation
  type: object

action_schema:
  title: Action
  type: object

reward_definition:
  title: Reward
  type: object

task_definitions:
  - name: task_easy_classification
    difficulty: easy
    objective: Basic classification accuracy for spam and urgent email.
  - name: task_medium_prioritization
    difficulty: medium
    objective: Prioritize urgent email, ignore spam, and choose correct responses.
  - name: task_hard_thread_reasoning
    difficulty: hard
    objective: Handle a multi-step thread and escalate only when the triggering follow-up arrives.
